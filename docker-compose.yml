services:

  fixupe:
    build:
      context: .
      dockerfile: Dockerfile.fixupe
    restart: always
    ports:
      - '3000:3000'
    env_file: 
     - .env
    volumes:
     - .:/app
     - ./node_modules:/app/node_modules

  nginx:
    build: 
     context: .
     dockerfile: ./etc/nginx/Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - fixupe
    volumes:
      - ./etc/nginx/default.conf:/etc/nginx/nginx.conf